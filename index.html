<!DOCTYPE html>
<html lang="PT-BR">
<head>


    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slot</title>

    <link rel="stylesheet" href="./css/Styles.css">

</head>


        
<body>
    <header>
        <nav>

            <h1 class="titulo">SLOT</h1>
        </nav>

    </header>



<div class="container">

    <div class="info">

        <div class="card-saldo">
            <p>Saldo: <span id="saldo">100</span></p>
        </div>

        <div class="card-mult">
            <p>Multiplicador: <span id="multiplicador">1x</span></p>
        </div>

        <div class="card-aposta">
            <p>Aposta: <span id="aposta">0</span></p>
        </div>
        
   </div>


   <div class="slot">

        <div class="reel" id="reel1">🍒</div>
        <div class="reel" id="reel2">🍋</div>
        <div class="reel" id="reel3">🔔</div>
    
   </div>

   

   <button>GIRAR</button>
    </div>
</body>
</html>
