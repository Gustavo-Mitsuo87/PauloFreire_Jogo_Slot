<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nome</title>
    <link rel="stylesheet" href="./css/styleEntrada.css">

    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
</head>


<body>
    
  <div>
  <h1 class="Titulo">DSBET ETEC SLOT Machine </h1>
  </div>

    <main class="Page">
        <section class="card">

                  <div class="card-nome">
                    <form class="card-nome">
                          <p class="SaldoMin"> Saldo Mínimo: 10 fichas</p>
                          <input placeholder="Digite o seu Nome" type="text" name="nome" id="name">
                          
                          <input placeholder="Digite o seu saldo(Ex: 10, 20, 50)" type="number" min="10" step="10" name="saldo" id="saldoInput">

                          <button type="button" id="btnEntrar">Entrar no Jogo</button>
                          
                    <p class="paragrafo"> Esse saldo será usado na partida</p>
                   </form>
              </div>

        </section>

    </main>

  <footer class="footer"> 
    <div class="footer-content">
      <h2 class="footer-logo">Slot</h2>

      <p class="footer-text">
        Projeto desenvolvido exclusivamente para fins educacionais, no âmbito das atividades acadêmicas da ETEC de
        Guarulhos.
      </p>

      <div class="footer-links">
        <a>Termos</a>
        <a>Privacidade</a>
        <a>Suporte</a>
      </div>

      <p class="footer-copy">© 2026 DSBet - Todos os direitos reservados</p>
    </div>
  </footer>
<script type="module" src="./js/main.js"></script>
</body>
</html>
