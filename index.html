<!DOCTYPE html>
<html lang="PT-BR">
<head>


    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slot</title>

    <link rel="stylesheet" href="./css/Styles.css">

</head>


        
<body>
    <header>
            <h1 class="titulo">SLOT</h1>
    </header>

<div class="anuncio-1"></div>

<div class="container-principal">

    <div class="container-slot">

        

        <div class="info">

            <div class="card-saldo">
                <p>Saldo: <span id="saldo">100</span> R$</p>
            </div>

            <div class="card-mult">
                <p>Multiplicador: <span id="multiplicador">1x</span></p>
            </div>

            <div class="card-aposta">
                <p>Aposta: <span id="aposta">0</span> R$</p>
            </div>
        
        </div>


    <div class="slot">

        <div class="reel" id="reel1">🍒</div>
        <div class="reel" id="reel2">🍋</div>
        <div class="reel" id="reel3">🔔</div>
    
    </div>

    <div class="container-time">
        <p id="timer">03:00</p>

    </div>

        <div class="container-botao">
            <button class="botao-menos">-</button>
            <button class="botao-girar">GIRAR</button>
            <button class="botao-mais">+</button>
        </div>

    </div>
</div>

<div class="anuncio-2"></div>
</body>
</html>
