<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSBET ETEC - Formulario Slot</title>
    <link rel="stylesheet" href="./css/styleEntrada.css">
    <link rel="shortcut icon" href="/assets/Icone_da_casa.png" type="image/png">

    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
</head>



<body>
  
 
 
  <header>
    <h1 class="titulo">SLOT</h1>
  </header>
 
  <div class="fundo-container">
            <div class="fundo-carrossel">
                <img class="fundo" src="./assets/fundo-slot.png" alt="Fundo">
                <img class="fundo" src="./assets/fundo-slot.png" alt="Fundo">
            </div>
        </div>

    <main class="Page">
        <section class="card">
          <div class="logo">
            <img class="logo-bet" src="./assets/Icone_da_casa.png">
            <img class="logo-bet" src="./assets/Logo Slot.png">
          </div>
          

                  <div class="card-nome">
                    <form class="card-nome">
                          <p class="SaldoMin"> Saldo Mínimo: 10 fichas</p>
                          

                           <div class="form-control">
                             <input type="text" required="" id="name" autocomplete="off">
                                <label>
                                    <span style="transition-delay:0ms">N</span><span style="transition-delay:50ms">o</span><span style="transition-delay:100ms">m</span><span style="transition-delay:150ms">e</span>
                                </label>
                          </div>
                          
                          <div class="form-control">
                             <input type="number" required="" id="saldoInput" autocomplete="off">
                                <label>
                                    <span style="transition-delay:0ms">S</span><span style="transition-delay:50ms">a</span><span style="transition-delay:100ms">l</span><span style="transition-delay:150ms">d</span><span style="transition-delay:200ms">o</span>
                                </label>
                          </div>

                          <button type="button" id="btnEntrar">Entrar no Jogo</button>
                          
                    <p class="paragrafo"> Esse saldo será usado na partida</p>
                   </form>
              </div>

        </section>

    </main>

  <footer class="footer"> 
    <div class="footer-content">
      <h2 class="footer-logo">Slot</h2>

      <p class="footer-text">
        Projeto desenvolvido exclusivamente para fins educacionais, no âmbito das atividades acadêmicas da ETEC de
        Guarulhos.
      </p>

      <div class="footer-links">
        <a>Termos</a>
        <a>Privacidade</a>
        <a>Suporte</a>
      </div>

      <p class="footer-copy">© 2026 DSBet - Todos os direitos reservados</p>
    </div>
  </footer>
<script type="module" src="./js/main.js"></script>


</body>
</html>
