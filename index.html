<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slots - O melhor jeito de apostar</title>
    <link rel="stylesheet" href="Styles.css">
</head>
<body>
    <header class="header">
        <nav class="nav">
            <img src="Logo Slot.png" height="95px" width="95px" alt="Logo Slot">
            <ul class="nav-list">
                <button class="btnNav">Sair</button>
            </ul>
        </nav>
    </header>

    <main class="page">
        <section class="top-cards">
            <div class="card bet">
                <div class="label">Aposta</div>
                <div class="value">$ xxxx</div>
            </div>

            <div class="card mult">
                <div class="label">Multiplicador</div>
                <div class="value">x.xx</div>
            </div>

            <div class="card win">
                <div class="label">Ganho Potencial</div>
                <div class="value">$ xxxx</div>
            </div>
        </section>

        <section class="game-layout">
            <aside class="formulario">
                <div class="caixa-aposta">
                    <h1>Aposta</h1>
                    <h2>$ 0</h2>
                </div>

                <div class="caixa-apostar">
                    <button class="btn-apostar-dez" id="btn-apostar-dez">
                        <img src="ficha10.png" alt="Ficha 10">
                    </button>

                    <button class="btn-apostar-cinquenta" id="btn-apostar-cinquenta">
                        <img src="ficha50.png" alt="Ficha 50">
                    </button>

                    <button class="btn-apostar-cem" id="btn-apostar-cem">
                        <img src="ficha100.png" alt="Ficha 100">
                    </button>
                </div>

                <button class="btn-coletar" id="btn-coletar">Coletar</button>
                <button class="btn-reiniciar" id="btn-reiniciar">Reiniciar</button>
            </aside>

            <section class="game-area">
                <div class="game-center">
                    <h1>Slot</h1>

                    <div class="slot-machine">
                        <div class="reels">
                            <div class="reel">7</div>
                            <div class="reel">7</div>
                            <div class="reel">7</div>
                        </div>

                        <p class="slot-text">Tente novamente!</p>

                        <button class="spin-btn" type="button">SPIN (10 créditos)</button>
                    </div>
                </div>
            </section>
        </section>
    </main>
</body>
</html>
